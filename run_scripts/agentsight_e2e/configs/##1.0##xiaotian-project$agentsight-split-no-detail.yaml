# Case D: stream split + trimmed messages (plugin defaults)
enable: true
inputs:
  - Type: input_agentsight
    ProbeConfig:
      Verbose: 1
      LogPath: /tmp/agentsight.log
      EventStreamFormat: true
      MessageDeltaOnly: true
flushers:
  - Type: flusher_sls
    Region: cn-hangzhou
    Endpoint: cn-hangzhou.log.aliyuncs.com
    Project: xiaotian-config
    Logstore: xiaotian-logstore
