# Case A: merged log + full messages (MessageDeltaOnly off)
enable: true
inputs:
  - Type: input_agentsight
    ProbeConfig:
      Verbose: 1
      LogPath: /tmp/agentsight.log
      EventStreamFormat: false
      MessageDeltaOnly: false
flushers:
  - Type: flusher_sls
    Region: cn-hangzhou
    Endpoint: cn-hangzhou.log.aliyuncs.com
    Project: xiaotian-config
    Logstore: xiaotian-logstore
