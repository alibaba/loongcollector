name: Docs CN Check

on:
  pull_request:
    paths:
      - "docs/cn/**"
      - "scripts/check_docs_cn_relative_links.py"
      - "scripts/validate_docs_cn_plugin_samples.py"
      - ".github/workflows/docs-cn-check.yaml"
  push:
    branches:
      - main
      - 1.*
      - 2.*
      - 3.*
    paths:
      - "docs/cn/**"
      - "scripts/check_docs_cn_relative_links.py"
      - "scripts/validate_docs_cn_plugin_samples.py"
      - ".github/workflows/docs-cn-check.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Relative markdown links (docs/cn)
        run: python3 scripts/check_docs_cn_relative_links.py

      - name: Plugin doc samples (JSON + YAML fences)
        run: python3 scripts/validate_docs_cn_plugin_samples.py
