syntax = "proto3";
package logtail.models;

option go_package = "protocol";

message SelfMonitorAlarm {
    string AlarmType = 1;
    string AlarmLevel = 2;
    string AlarmMessage = 3;
    string ProjectName = 4;
    string Category = 5;
    string Config = 6;
    int32 Count = 7;
}

message SelfMonitorAlarmList {
    repeated SelfMonitorAlarm Alarms = 1;
}
