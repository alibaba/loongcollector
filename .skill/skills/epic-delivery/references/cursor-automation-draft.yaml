# Cursor Automation draft — import via Agents Window open_automation or manual setup.
# See .skill/skills/epic-delivery/references/cursor-automation-setup.md
# Fallback when Cloud Agent unavailable: scripts/epic/wake-local.sh
name: "Epic Delivery: PR comment wake"
description: "When a PR on alibaba/loongcollector receives a comment, triage human feedback and run AddressFeedback."
workflow:
  triggers:
    - git:
        pullRequest:
          repos:
            - alibaba/loongcollector
          events:
            - GIT_PULL_REQUEST_ACTION_COMMENTED
          ignoreDraftPrs: false
  actions:
    - prComment: {}
  gitConfig:
    repo: alibaba/loongcollector
    branch: main
  prompts:
    - |
      You are the **Epic Delivery orchestrator** for alibaba/loongcollector.

      ## Trigger context
      A pull request received a new comment. Use the PR number from the automation trigger payload.

      ## Step 1 — Triage (mandatory, latest comment only)
      Run:
      ```bash
      bash scripts/epic/triage-pr-feedback.sh --repo alibaba/loongcollector --pr <PR_NUMBER> --latest-only
      ```

      Rules (see references/comment-convention.md):
      - Comments with `[epic-delivery] from=agent` and action=none → **skip**
      - Comments **without** agent tag → **human feedback**, process

      If triage shows OK (no human feedback on latest comment), post:
      ```
      [epic-delivery triage] Latest comment is agent info or no action needed.

      ---
      `[epic-delivery]` from=agent role=orchestrator action=none
      ```
      Then **stop**.

      ## Step 2 — Address feedback
      If triage shows ACTION REQUIRED:
      1. Load `.skill/skills/epic-delivery/SKILL.md` stage 6.
      2. C++ changes: load `.claude/skills/compile/SKILL.md` and run `make core` + `run_core_ut.sh` — never skip with "no cmake / wait for CI".
      3. Fix in worktree; push to PR branch.
      4. Reply with `from=agent role=feedback-handler action=none` footer.

      ## Guardrails
      - Do NOT merge or approve.
      - Do NOT modify `.github/workflows/`.
      - Only **Agent** comments need epic-delivery footer; human comments have no format requirement.
  model: ""
  agentOptions:
    skipInstall: false
  memoryEnabled: true
