receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  file/logs:
    path: /tmp/otel-export/logs.json
  file/metrics:
    path: /tmp/otel-export/metrics.json
  file/traces:
    path: /tmp/otel-export/traces.json

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [debug, file/logs]
    metrics:
      receivers: [otlp]
      exporters: [debug, file/metrics]
    traces:
      receivers: [otlp]
      exporters: [debug, file/traces]
